<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>互動數獨 - 現代響應式版</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <nav class="top-nav">
        <div style="display:flex; align-items:center; gap: 15px;">
            <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
            <h1>離線數獨</h1>
        </div>
        <div style="display:flex; align-items:center; gap: 15px;">
            <!-- 新增：頂部導覽列使用者狀態區域 -->
            <div class="user-auth-section" id="user-auth-section" style="display:flex; align-items:center; gap: 10px;">
                <button class="auth-trigger-btn" id="btn-navbar-login" onclick="openAuthModal('login')">登入</button>
                <button class="auth-trigger-btn btn-secondary-auth" id="btn-navbar-register" onclick="openAuthModal('register')">註冊</button>
                <div class="user-welcome-info hidden" id="user-welcome-info" style="display:flex; align-items:center; gap: 8px; font-size: 14px;">
                    <span class="user-avatar">👤</span>
                    <span id="user-display-name" style="font-weight: 600;"></span>
                    <span id="user-display-role" class="user-role-badge"></span>
                </div>
                <button class="auth-trigger-btn admin-only-btn hidden" id="btn-navbar-admin" onclick="openAdminPanel()" style="background-color: hsl(263, 80%, 50%); color: white; display: flex; align-items: center; gap: 4px;">🛡️ 後台管理</button>
                <button class="auth-trigger-btn logout-btn hidden" id="btn-navbar-logout" onclick="handleLogout()">登出</button>
            </div>

            <div class="difficulty-selector desktop-only">
                <span>難度：</span>
                <select id="difficulty-desktop" onchange="requestNewGame(this.value, this.id)">
                    <option value="easy">簡單</option>
                    <option value="medium">中等</option>
                    <option value="hard">困難</option>
                </select>
                <button class="new-game-btn" style="margin-left: 15px;" onclick="requestNewGame()">新遊戲</button>
            </div>
        </div>
    </nav>

    <!-- Sidebar Menu -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="close-btn" onclick="toggleSidebar()">×</button>
        </div>
        <div class="sidebar-menu">
            <!-- 新增：側邊欄使用者狀態/登入註冊入口 -->
            <div class="sidebar-user-section" id="sidebar-user-section" style="padding: 15px 20px; border-bottom: 1px solid var(--border-color); margin-bottom: 10px;">
                <div id="sidebar-auth-buttons" style="display:flex; gap: 8px;">
                    <button class="sidebar-auth-btn" onclick="toggleSidebar(); openAuthModal('login')" style="flex:1; padding: 6px 12px; font-size:13px; font-weight:600; border-radius: 6px; border:1px solid var(--border-color); background:white; cursor:pointer;">🔑 登入</button>
                    <button class="sidebar-auth-btn" onclick="toggleSidebar(); openAuthModal('register')" style="flex:1; padding: 6px 12px; font-size:13px; font-weight:600; border-radius: 6px; border:none; background:#5c7cfa; color:white; cursor:pointer;">📝 註冊</button>
                </div>
                <div id="sidebar-user-info" class="hidden">
                    <div style="display:flex; align-items:center; gap:10px; margin-bottom: 8px;">
                        <span style="font-size:20px;">👤</span>
                        <div>
                            <div id="sidebar-username" style="font-weight:700; color:var(--text-main); font-size: 14px;"></div>
                            <div id="sidebar-role" style="font-size:11px; color:var(--text-muted); margin-top:2px;"></div>
                        </div>
                    </div>
                    <button class="sidebar-logout-btn" onclick="toggleSidebar(); handleLogout()" style="width:100%; padding:6px 0; font-size:13px; font-weight:600; background:#fff0f6; color:#f03e3e; border:1px solid #ffdeeb; border-radius:6px; cursor:pointer; transition:all 0.2s;">🚪 登出</button>
                </div>
            </div>

            <a class="sidebar-link" onclick="toggleSidebar(); requestNewGame('easy', 'difficulty-desktop')">經典數獨</a>

            <a class="sidebar-link" onclick="toggleSidebar(); startSolverMode()">數獨求解器</a>
            <a class="sidebar-link hidden" id="sidebar-admin-link" onclick="toggleSidebar(); openAdminPanel()" style="color: hsl(263, 80%, 50%); font-weight: 700;">🛡️ 後台管理系統</a>
            <a class="sidebar-link" onclick="toggleSidebar(); openRulesModal()">規則</a>
            <a class="sidebar-link" onclick="toggleSidebar(); openSettings()">⚙️ 設定</a>
        </div>
    </div>

    <div class="game-wrapper">
        <!-- Board Section -->
        <div class="board-section">
            <!-- 新增：數獨求解器衝突警告區塊 -->
            <div id="solver-conflict-alert" class="solver-alert-box hidden">
                ⚠️ 相同的數字不能放在同一列、行或宮中。請檢查數字並重試。
            </div>

            <div class="stats-header mobile-only">
                <span id="mistakes-mobile">錯誤: 0/3</span>
                <div class="timer-group">
                    <span id="timer-mobile">00:00</span>
                    <button class="pause-btn" onclick="togglePause()">⏸</button>
                </div>
            </div>

            <div id="sudoku-grid"></div>

            <div id="pause-overlay" class="pause-overlay hidden">
                <div class="play-icon" onclick="togglePause()">▶</div>
                <div class="pause-text">遊戲暫停</div>
            </div>
        </div>

        <!-- Controls Section -->
        <div class="controls-section" style="position: relative;">
            <div class="stats-header desktop-only">
                <span id="mistakes-desktop">錯誤: 0/3</span>
                <div class="timer-group">
                    <span id="timer-desktop">00:00</span>
                    <button class="pause-btn" onclick="togglePause()">⏸</button>
                </div>
            </div>

            <div class="difficulty-selector mobile-only" style="margin-bottom: 15px; justify-content: center;">
                <span>難度：</span>
                <select id="difficulty-mobile" onchange="requestNewGame(this.value, this.id)">
                    <option value="easy">簡單</option>
                    <option value="medium">中等</option>
                    <option value="hard">困難</option>
                </select>
            </div>

            <div class="action-bar">
                <button class="action-btn" onclick="undo()">
                    <div class="action-icon-wrapper">↶</div>
                    <span>復原</span>
                </button>
                <button class="action-btn" onclick="erase()">
                    <div class="action-icon-wrapper">🗑️</div>
                    <span>清除</span>
                </button>
                <!-- 新增：求解器專屬的全部清除按鈕，平常隱藏，求解器模式下顯示 -->
                <button class="action-btn hidden" id="btn-clear-all" onclick="clearSolverBoard()">
                    <div class="action-icon-wrapper">🔄</div>
                    <span>全部清除</span>
                </button>
                <button class="action-btn" id="btn-notes" onclick="toggleNotes()">
                    <div class="action-icon-wrapper">✏️<span class="badge">ON</span></div>
                    <span>筆記</span>
                </button>
                <button class="action-btn" onclick="startTutorialHint()">
                    <div class="action-icon-wrapper">💡</div>
                    <span>提示</span>
                </button>
            </div>

            <div class="numpad">
                <button id="numpad-btn-1" onclick="inputNumber(1)">1</button>
                <button id="numpad-btn-2" onclick="inputNumber(2)">2</button>
                <button id="numpad-btn-3" onclick="inputNumber(3)">3</button>
                <button id="numpad-btn-4" onclick="inputNumber(4)">4</button>
                <button id="numpad-btn-5" onclick="inputNumber(5)">5</button>
                <button id="numpad-btn-6" onclick="inputNumber(6)">6</button>
                <button id="numpad-btn-7" onclick="inputNumber(7)">7</button>
                <button id="numpad-btn-8" onclick="inputNumber(8)">8</button>
                <button id="numpad-btn-9" onclick="inputNumber(9)">9</button>
            </div>

            <div id="solver-actions" class="hidden" style="margin-top: 15px; display: flex; gap: 10px; width: 100%;">
                <button class="new-game-btn" id="btn-solve-puzzle" style="flex: 1; background-color: #51cf66;" onclick="solvePuzzle()">求解</button>
                <button class="new-game-btn" style="flex: 1; background-color: #fa5252;" onclick="exitSolverMode()">退出</button>
            </div>


            <button class="new-game-btn mobile-new-game" id="btn-new-game-mobile" onclick="requestNewGame()">新遊戲</button>
            <div id="message"></div>
            <!-- Interactive Tutorial Panel -->
            <div class="tutorial-overlay" id="tutorial-overlay" onclick="endTutorial()"></div>
            <div class="tutorial-panel" id="tutorial-panel">
                <div class="tutorial-header">
                    <h3>💡 教學引導</h3>
                    <button class="close-btn" onclick="endTutorial()">×</button>
                </div>
                <div class="tutorial-body" id="tutorial-body"></div>
                <div class="tutorial-footer">
                    <div class="tutorial-dots" id="tutorial-dots">
                        <span class="dot active"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                        <span class="dot"></span>
                    </div>
                    <div class="tutorial-actions">
                        <button class="btn btn-secondary" id="btn-prev-step" onclick="prevTutorialStep()">上一步</button>
                        <button class="btn btn-primary" id="btn-next-step" onclick="nextTutorialStep()">下一步</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Settings Modal -->
    <div class="settings-overlay" id="settings-overlay" onclick="if(event.target===this) closeSettings()">
        <div class="settings-panel">
            <div class="settings-header">
                <h3>⚙️ 設定</h3>
                <button class="close-btn" onclick="closeSettings()">×</button>
            </div>
            <div class="setting-item">
                <div>
                    <div class="setting-label">隱藏已完成數字</div>
                    <div class="setting-desc">盤面某數字達到9個時，面板對應按鈕打勾</div>
                </div>
                <label class="switch"><input type="checkbox" id="set-hide-completed" onchange="updateSettings()"><span
                        class="slider"></span></label>
            </div>
            <div class="setting-item">
                <div>
                    <div class="setting-label">標記相同數字</div>
                    <div class="setting-desc">選取格子時，高亮盤面上相同的數字</div>
                </div>
                <label class="switch"><input type="checkbox" id="set-highlight-identical"
                        onchange="updateSettings()"><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <div>
                    <div class="setting-label">標記關聯區域</div>
                    <div class="setting-desc">高亮選取格子所在的行、列與宮格</div>
                </div>
                <label class="switch"><input type="checkbox" id="set-highlight-related"
                        onchange="updateSettings()"><span class="slider"></span></label>
            </div>
            <div class="setting-item">
                <div>
                    <div class="setting-label">標記錯誤</div>
                    <div class="setting-desc">自動用紅色標示填錯的數字</div>
                </div>
                <label class="switch"><input type="checkbox" id="set-show-error" onchange="updateSettings()"><span
                        class="slider"></span></label>
            </div>
        </div>
    </div>

    <!-- New Game Confirm Modal -->
    <div class="confirm-overlay" id="confirm-overlay" onclick="if(event.target===this) cancelNewGame()">
        <div class="confirm-panel">
            <h3 class="confirm-title">開始新遊戲</h3>
            <p class="confirm-subtitle">將會失去目前遊戲進度</p>
            <div class="confirm-buttons">
                <button class="btn-ok" onclick="confirmNewGame()">OK</button>
                <button class="btn-cancel" onclick="cancelNewGame()">取消</button>
            </div>
            <div class="confirm-checkbox">
                <label>
                    <input type="checkbox" id="dont-ask-checkbox"> 不再詢問
                </label>
            </div>
        </div>
    </div>

    <!-- Rules Modal -->
    <div class="rules-overlay" id="rules-overlay" onclick="if(event.target===this) closeRulesModal()">
        <div class="rules-panel">
            <div class="rules-header">
                <h3>📖 數獨規則</h3>
                <button class="close-btn" onclick="closeRulesModal()">×</button>
            </div>
            <div class="rules-layout">
                <div class="rules-toc" id="rules-toc">
                    <!-- 目錄項目將由 JS 動態生成 -->
                </div>
                <div class="rules-content" id="rules-content">
                    <!-- 規則內容將由 JS 動態生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 新增：註冊/登入彈窗 (Auth Modal) -->
    <div class="auth-overlay" id="auth-overlay" onclick="if(event.target===this) closeAuthModal()">
        <div class="auth-panel">
            <div class="auth-header">
                <h3 id="auth-title">登入帳戶</h3>
                <button class="close-btn" onclick="closeAuthModal()">×</button>
            </div>
            <div class="auth-body">
                <form id="auth-form" onsubmit="handleAuthSubmit(event)">
                    <input type="hidden" id="auth-action" value="login">
                    <div class="auth-input-group">
                        <label for="auth-username">帳號 (Username)</label>
                        <input type="text" id="auth-username" required placeholder="請輸入英數字與底線">
                    </div>
                    <div class="auth-input-group">
                        <label for="auth-password">密碼 (Password)</label>
                        <div class="password-wrapper">
                            <input type="password" id="auth-password" required placeholder="請輸入密碼 (至少6位)">
                            <button type="button" class="password-toggle-btn" id="btn-toggle-password" onclick="togglePasswordVisibility()">👁️</button>
                        </div>
                    </div>
                    <div id="auth-message" class="auth-message hidden"></div>
                    <button type="submit" class="auth-submit-btn" id="btn-auth-submit">立即登入</button>
                </form>
                <div class="auth-toggle-prompt">
                    <span id="auth-toggle-text">沒有帳號？</span>
                    <a href="javascript:void(0)" id="auth-toggle-link" onclick="toggleAuthMode()">立即註冊</a>
                </div>
            </div>
        </div>
    </div>



    <script src="script.js"></script>
</body>

</html>
